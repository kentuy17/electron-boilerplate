<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Electron CRUD App</title>
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		<div class="container">
			<header>
				<h1>Electron CRUD + SQLite</h1>
				<p>Add, edit, delete, and export records to Excel.</p>
			</header>

			<section class="main">
				<form id="record-form" class="record-form">
					<input id="record-id" type="hidden">
					<label for="name">Name</label>
					<input id="name" name="name" required placeholder="Jane Doe">

					<label for="email">Email</label>
					<input id="email" name="email" type="email" required placeholder="jane@example.com">

					<div class="button-row">
						<button id="submit-btn" type="submit">Add Record</button>
						<button id="cancel-edit-btn" type="button" hidden>Cancel Edit</button>
						<button id="export-btn" type="button" class="secondary-btn">Download Excel</button>
					</div>
				</form>

				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Name</th>
							<th>Email</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="records-body"></tbody>
				</table>

				<p id="status-text" class="status-text" aria-live="polite"></p>
			</section>
		</div>

		<script src="renderer.js"></script>
	</body>
</html>
