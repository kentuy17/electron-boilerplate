<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Electron CRUD App</title>
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		<div class="container">
			<header>
				<h1>Applicant Import + SQLite</h1>
				<p>Import Excel/CSV files with <code>applicant_name</code> and <code>applicant_code</code>.</p>
			</header>

			<section class="main">
				<div class="button-row import-row">
					<button id="import-btn" type="button">Import Excel/CSV</button>
					<button id="export-btn" type="button" class="secondary-btn">Download Excel</button>
					<button id="template-btn" type="button" class="secondary-btn">Download Template</button>
				</div>

				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Applicant Name</th>
							<th>Applicant Code</th>
						</tr>
					</thead>
					<tbody id="records-body"></tbody>
				</table>

				<p id="status-text" class="status-text" aria-live="polite"></p>
			</section>
		</div>

		<script src="renderer.js"></script>
	</body>
</html>
